name: "Deploy"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Package source
        run: |
          Compress-Archive -Path src, tests, docs, requirements.txt, README.md, CLAUDE.md -DestinationPath screenshot-tool.zip -Force
          dir screenshot-tool.zip